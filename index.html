<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ahaan Planner</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#111111">
</head>
<body>

<div class="app">
  <h1>📅 Ahaan Planner</h1>

  <div class="calendar-header">
    <button id="prevMonth">‹</button>
    <h2 id="monthYear"></h2>
    <button id="nextMonth">›</button>
  </div>

  <div class="days">
    <div>Sun</div><div>Mon</div><div>Tue</div>
    <div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
  </div>

  <div id="calendar" class="calendar"></div>
</div>

<div id="popup" class="popup hidden">
  <div class="popup-content">
    <h3>Select Status</h3>
    <button onclick="setStatus('available')">🟢 Available</button>
    <button onclick="setStatus('booked')">🔴 Booked</button>
    <button onclick="setStatus('cancelled')">⚫ Cancelled</button>
    <button onclick="clearStatus()">Clear</button>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
